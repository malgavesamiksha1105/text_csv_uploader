<!DOCTYPE html>
<html>
<head>
<title>Review Analytics Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
margin:0;
padding:0;
}

.header{
background:#1e293b;
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:600;
}

.container{
width:90%;
margin:auto;
margin-top:20px;
}

.upload-box{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
margin:10px;
}

button:hover{
background:#1d4ed8;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:20px;
}

.card{
padding:20px;
border-radius:10px;
color:white;
font-size:18px;
text-align:center;
}

.pos{background:#16a34a;}
.neg{background:#dc2626;}
.neu{background:#f59e0b;}
.spam{background:#9333ea;}

.section{
background:white;
margin-top:20px;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

th{
background:#2563eb;
color:white;
}

canvas{
margin-top:20px;
}

</style>
</head>

<body>

<div class="header">
Review Analytics Dashboard
</div>

<div class="container">

<div class="upload-box">

<h3>Upload Review File</h3>

<input type="file" id="fileInput" accept=".txt,.csv">

<br>

<button onclick="analyzeFile()">Upload & Analyze</button>
<button onclick="showAnalytics()">View Analytics</button>

<p id="status"></p>

</div>

<div class="cards">

<div class="card pos">
Positive
<h2 id="posCount">0</h2>
</div>

<div class="card neg">
Negative
<h2 id="negCount">0</h2>
</div>

<div class="card neu">
Neutral
<h2 id="neuCount">0</h2>
</div>

<div class="card spam">
Spam
<h2 id="spamCount">0</h2>
</div>

</div>

<div class="section">

<h3>CSV Table Preview</h3>

<div id="tablePreview"></div>

</div>

<div class="section">

<h3>Review Analytics Chart</h3>

<canvas id="chart"></canvas>

</div>

</div>

<script>

let positiveCount=0;
let negativeCount=0;
let neutralCount=0;
let spamCount=0;

function analyzeFile(){

const file=document.getElementById("fileInput").files[0];

if(!file){
document.getElementById("status").innerText="No file chosen.";
return;
}

positiveCount=0;
negativeCount=0;
neutralCount=0;
spamCount=0;

const reader=new FileReader();

reader.onload=function(e){

const text=e.target.result;

let reviews=text.split("\n");

reviews.forEach(r=>analyzeText(r));

updateCards();

if(file.name.endsWith(".csv")){
displayCSV(text);
}

document.getElementById("status").innerText="Analysis Completed";

}

reader.readAsText(file);

}

function analyzeText(text){

text=text.toLowerCase();

let posWords=["good","great","excellent","amazing","love","nice"];
let negWords=["bad","worst","poor","terrible","hate"];
let spamWords=["buy now","click here","free money","subscribe"];

for(let word of spamWords){
if(text.includes(word)){
spamCount++;
return;
}
}

let pos=0;
let neg=0;

posWords.forEach(w=>{
if(text.includes(w)) pos++;
});

negWords.forEach(w=>{
if(text.includes(w)) neg++;
});

if(pos>neg) positiveCount++;
else if(neg>pos) negativeCount++;
else neutralCount++;

}

function updateCards(){

document.getElementById("posCount").innerText=positiveCount;
document.getElementById("negCount").innerText=negativeCount;
document.getElementById("neuCount").innerText=neutralCount;
document.getElementById("spamCount").innerText=spamCount;

}

function displayCSV(text){

let rows=text.split("\n");

let table="<table>";

rows.forEach((row,i)=>{

let cols=row.split(",");

table+="<tr>";

cols.forEach(col=>{

if(i==0){
table+="<th>"+col+"</th>";
}
else{
table+="<td>"+col+"</td>";
}

});

table+="</tr>";

});

table+="</table>";

document.getElementById("tablePreview").innerHTML=table;

}

function showAnalytics(){

const ctx=document.getElementById("chart");

new Chart(ctx,{
type:'bar',
data:{
labels:["Positive","Negative","Neutral","Spam"],
datasets:[{
label:"Reviews",
data:[positiveCount,negativeCount,neutralCount,spamCount],
backgroundColor:[
"#16a34a",
"#dc2626",
"#f59e0b",
"#9333ea"
]
}]
},
options:{
responsive:true
}
});

}

</script>

</body>
</html>
