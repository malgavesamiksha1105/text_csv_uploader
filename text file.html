<!DOCTYPE html>
<html>
<head>
    <title>File Upload UI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        #content {
            margin-top: 20px;
            white-space: pre-wrap;
            border: 1px solid #ccc;
            padding: 10px;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <h2>Upload Text or CSV File</h2>

    <input type="file" id="fileInput" accept=".txt,.csv" />
    <br><br>
    <button onclick="readFile()">Upload & Display</button>

    <div id="content"></div>

    <script>
        function readFile() {
            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];

            if (!file) {
                alert("Please select a file first.");
                return;
            }

            const reader = new FileReader();

            reader.onload = function(e) {
                document.getElementById("content").textContent = e.target.result;
            };

            reader.readAsText(file);
        }
    </script>

</body>
</html>
