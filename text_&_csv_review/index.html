<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload Reviews</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Review Analytics Dashboard</h1>

<div class="card">
    <h2>Upload Review File</h2>
    <input type="file" id="fileInput">
    <br><br>
    <button onclick="goToPage2()">Upload & Analyze</button>
</div>

<script>
async function goToPage2() {
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];

    let formData = new FormData();
    formData.append("file", file);

    let response = await fetch("http://127.0.0.1:5000/analyze", {
        method: "POST",
        body: formData
    });

    let data = await response.json();

    localStorage.setItem("analysisData", JSON.stringify(data));

    window.location.href = "analytics.html";
}
</script>


</body>
</html>
